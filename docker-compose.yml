# Local development stack: Postgres + FastAPI backend + built frontend.
# Usage:
#   docker compose up --build
#   docker compose exec backend python -m app.seed   # load sample data
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ckin
      POSTGRES_PASSWORD: ckin
      POSTGRES_DB: ckin
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ckin"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://ckin:ckin@db:5432/ckin
      JWT_SECRET: dev-secret-change-me
      FRONTEND_ORIGIN: http://localhost:5173
      DISPLAY_TIMEZONE: America/New_York
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        # Same-origin empty base won't work across containers; point at backend.
        VITE_API_BASE: "http://localhost:8000"
    ports:
      - "5173:8080"
    depends_on:
      - backend

volumes:
  pgdata:
